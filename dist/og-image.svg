<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#070708" />

  <!-- Center-aligned 2x2 Grid of ASCII Cells -->
  <g transform="translate(390, 105)">
    <!-- Square 1 (Top Left) -->
    <rect x="0" y="0" width="200" height="200" fill="#0825d8" fill-opacity="0.9" stroke="rgba(255,255,255,0.08)" stroke-width="2" />
    <text x="100" y="150" font-family="'Courier New', Courier, monospace" font-size="140" font-weight="700" fill="rgba(255,255,255,0.96)" text-anchor="middle">@</text>
    
    <!-- Square 2 (Top Right) -->
    <rect x="220" y="0" width="200" height="200" fill="#4c23d1" fill-opacity="0.9" stroke="rgba(255,255,255,0.08)" stroke-width="2" />
    <text x="320" y="150" font-family="'Courier New', Courier, monospace" font-size="140" font-weight="700" fill="rgba(255,255,255,0.96)" text-anchor="middle">-</text>
    
    <!-- Square 4 (Bottom Left) -->
    <rect x="0" y="220" width="200" height="200" fill="#008b61" fill-opacity="0.9" stroke="rgba(255,255,255,0.08)" stroke-width="2" />
    <text x="100" y="370" font-family="'Courier New', Courier, monospace" font-size="140" font-weight="700" fill="rgba(255,255,255,0.96)" text-anchor="middle">*</text>
    
    <!-- Square 3 (Bottom Right) -->
    <rect x="220" y="220" width="200" height="200" fill="#06167a" fill-opacity="0.9" stroke="rgba(255,255,255,0.08)" stroke-width="2" />
    <text x="320" y="370" font-family="'Courier New', Courier, monospace" font-size="140" font-weight="700" fill="rgba(255,255,255,0.96)" text-anchor="middle">:</text>
  </g>
</svg>
